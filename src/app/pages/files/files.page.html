<app-shell activeTab="files">

  <ion-header class="ion-no-border">
    <ion-toolbar class="sky-toolbar">
      <ion-title>Arquivos</ion-title>
    </ion-toolbar>
    <ion-toolbar class="sky-toolbar filter-toolbar">
      <div class="filter-row">
        <button class="filter-chip" [class.active]="activeFilter === 'all'" (click)="setFilter('all')">Todos</button>
        <button class="filter-chip" [class.active]="activeFilter === 'image'" (click)="setFilter('image')">Imagens</button>
        <button class="filter-chip" [class.active]="activeFilter === 'document'" (click)="setFilter('document')">Documentos</button>
        <button class="filter-chip" [class.active]="activeFilter === 'audio'" (click)="setFilter('audio')">Áudios</button>
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-content class="files-page">
    <ion-list class="file-list" lines="none">
      <ion-item *ngFor="let f of filtered" button detail="false" class="file-item">
        <div class="file-icon" slot="start">
          <ion-icon [name]="iconFor(f.kind)"></ion-icon>
        </div>
        <ion-label>
          <div class="file-name">{{ f.name }}</div>
          <div class="file-meta">{{ f.from }} · {{ f.time }} · {{ f.size }}</div>
        </ion-label>
        <ion-button fill="clear" slot="end" aria-label="Baixar arquivo">
          <ion-icon name="download-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <div class="empty-state" *ngIf="filtered.length === 0">
      <ion-icon name="folder-open-outline"></ion-icon>
      <p>Nenhum arquivo nessa categoria</p>
    </div>
  </ion-content>

</app-shell>
