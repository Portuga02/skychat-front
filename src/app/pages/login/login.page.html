<ion-content class="login-page" [fullscreen]="true">
  <div class="login-wrap">

    <div class="brand">
      <div class="brand-moon">
        <ion-icon name="moon"></ion-icon>
      </div>
      <h1>SkyChat</h1>
      <p class="tagline">Conecte-se. Converse. Esteja presente.</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()">
      <ion-item lines="none" class="field">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          placeholder="E-mail"
          [(ngModel)]="email"
          name="email"
          required>
        </ion-input>
      </ion-item>

      <ion-item lines="none" class="field">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          type="password"
          placeholder="Senha"
          [(ngModel)]="password"
          name="password"
          required>
        </ion-input>
      </ion-item>

      <ion-button
        expand="block"
        shape="round"
        type="submit"
        class="btn-primary"
        [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Entrar</span>
      </ion-button>

      <ion-button
        expand="block"
        shape="round"
        fill="outline"
        class="btn-secondary"
        routerLink="/register">
        Criar conta
      </ion-button>

      <ion-button
        expand="block"
        fill="clear"
        class="btn-guest"
        (click)="onGuest()">
        Continuar como convidado
      </ion-button>
    </form>

  </div>
</ion-content>
