<app-shell activeTab="profile">

  <ion-header class="ion-no-border">
    <ion-toolbar class="sky-toolbar">
      <ion-title>Perfil</ion-title>
      <ion-buttons slot="end">
        <ion-button [attr.aria-label]="editing ? 'Cancelar edição' : 'Editar perfil'" (click)="toggleEdit()">
          <ion-icon [name]="editing ? 'close-outline' : 'create-outline'" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="profile-page">
    <div class="profile-wrap">

      <div class="avatar-block">
        <div class="big-avatar">{{ name.charAt(0) }}</div>
        <button class="change-photo" *ngIf="editing" aria-label="Trocar foto">
          <ion-icon name="camera-outline"></ion-icon>
        </button>
      </div>

      <div class="field-group">
        <label>Nome</label>
        <ion-input *ngIf="editing" [(ngModel)]="name" class="edit-input"></ion-input>
        <p *ngIf="!editing">{{ name }}</p>
      </div>

      <div class="field-group">
        <label>Recado</label>
        <ion-input *ngIf="editing" [(ngModel)]="bio" class="edit-input"></ion-input>
        <p *ngIf="!editing">{{ bio }}</p>
      </div>

      <div class="field-group">
        <label>E-mail</label>
        <p class="readonly">{{ email }}</p>
      </div>

      <ion-button expand="block" shape="round" class="btn-save" *ngIf="editing" (click)="save()">
        Salvar alterações
      </ion-button>
    </div>
  </ion-content>

</app-shell>
