<ion-content class="register-page" [fullscreen]="true">
  <div class="register-wrap">

    <div class="brand">
      <div class="brand-moon">
        <ion-icon name="moon"></ion-icon>
      </div>
      <h1>Criar conta</h1>
      <p class="tagline">Leva menos de um minuto</p>
    </div>

    <form class="register-form" (ngSubmit)="onRegister()">
      <ion-item lines="none" class="field">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input type="text" placeholder="Nome completo" [(ngModel)]="name" name="name" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="field">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="E-mail" [(ngModel)]="email" name="email" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="field">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input type="password" placeholder="Senha" [(ngModel)]="password" name="password" required></ion-input>
      </ion-item>

      <ion-item lines="none" class="field">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input type="password" placeholder="Confirmar senha" [(ngModel)]="confirmPassword" name="confirmPassword" required></ion-input>
      </ion-item>

      <p class="error-text" *ngIf="error">{{ error }}</p>

      <ion-button expand="block" shape="round" type="submit" class="btn-primary" [disabled]="loading">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">Criar conta</span>
      </ion-button>

      <ion-button expand="block" fill="clear" class="btn-back" (click)="goToLogin()">
        Já tenho conta — Entrar
      </ion-button>
    </form>

  </div>
</ion-content>
